name: Player Two Turn

on:
  schedule:
    - cron: '30 * * * *'  # every hour, offset 30min from player one
  workflow_dispatch:

permissions:
  contents: read

jobs:
  take-turn:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install GitHub Copilot CLI
        run: npm install -g @github/copilot
        env:
          COPILOT_GITHUB_TOKEN: ${{ secrets.COPILOT_GITHUB_TOKEN }}
          GH_TOKEN: ${{ github.token }}

      - name: Run player agent
        run: |
          AGENT_PROMPT=$(cat .github/agents/sandcastle-player.agent.md)
          timeout --foreground --signal=TERM --kill-after=30s 300s \
            copilot --prompt "$AGENT_PROMPT" --allow-all-tools --allow-all-paths < /dev/null || true
        env:
          COPILOT_GITHUB_TOKEN: ${{ secrets.COPILOT_GITHUB_TOKEN }}
          GH_TOKEN: ${{ github.token }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GAME_API_KEY: ${{ secrets.GAME_API_KEY }}
